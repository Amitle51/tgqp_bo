# ============================================================
# TGQP-BO: Conda Environment
# Exported from: bayes_gp (Windows), adapted for cross-platform use
#
# Create:   conda env create -f environment.yml
# Activate: conda activate tgqp_bo
#
# After activating, install the hdtg R package:
#   Rscript -e "install.packages('https://cran.r-project.org/src/contrib/Archive/hdtg/hdtg_0.2.1.tar.gz', repos=NULL, type='source')"
# ============================================================

name: tgqp_bo

channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  # --- Python ---
  - python=3.10.19

  # --- R ---
  - r-base=4.4.3

  # --- Core Scientific Computing ---
  - numpy=1.23.5
  - scipy=1.10.1
  - pandas=1.5.3

  # --- Gaussian Processes ---
  - gpy=1.10.0
  - paramz=0.9.6

  # --- PyTorch Stack ---
  - pytorch=2.2.2
  - botorch=0.8.5
  - gpytorch=1.10
  - linear_operator=0.4.0

  # --- Visualization ---
  - matplotlib=3.4.3
  - seaborn=0.13.2

  # --- Utilities ---
  - scikit-learn=1.0.2

  # --- R-Python Interface ---
  - rpy2=3.6.4
